substitutions:
  name_of_board: gate-control-1
  friendly_name_of_board: 'Side Gate Control 1'
  ha_icon: mdi:water

esphome:
  name: ${name_of_board}
  friendly_name: ${friendly_name_of_board}
  min_version: 2026.7.0
  name_add_mac_suffix: false

esp32:
  board: wemos_d1_mini32

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

web_server:
  port: 80
  auth:
    username: !secret web_username
    password: !secret web_password
    type: digest

# Allow Over-The-Air updates
ota:
- platform: esphome
  password: !secret otapw

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret ap_wifi_password

captive_portal:

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: Uptime
    icon: mdi:clock-start

switch:
  - platform: gpio
    pin: GPIO22
    id: relay
    name: "Gate Remote"
    icon: "mdi:gate"
    on_turn_on:
    - light.turn_on:
        id: status_led_light
    - delay: 500ms
    - switch.turn_off: relay
    - light.turn_off:
        id: status_led_light

light:
  - platform: status_led
    name: "Switch state"
    id: status_led_light
    icon: "mdi:led-variant-on"
    pin: 
      number: GPIO2
      inverted: false
