esphome:
  name: gate-control-x2
  friendly_name: Front gate control 2x
  min_version: 2026.7.0

esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

web_server:
  port: 80
  auth:
    username: !secret web_username
    password: !secret web_password
    type: digest

# Allow Over-The-Air updates
ota:
- platform: esphome
  password: !secret otapw

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret ap_wifi_password

captive_portal:

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: Uptime
    icon: mdi:clock-start
  - platform: internal_temperature
    name: "Internal Temperature"

# Relays exposed as switches
switch:
  - platform: gpio
    pin: GPIO17
    id: relay_1
    name: "Gate Remote 1"
    icon: "mdi:gate"
    on_turn_on:
    - light.turn_on:
        id: status_led_light
    - delay: 500ms
    - switch.turn_off: relay_1
    - light.turn_off:
        id: status_led_light

  - platform: gpio
    pin: GPIO16
    id: relay_2
    name: "Gate Remote 2"
    icon: "mdi:gate"
    on_turn_on:
    - light.turn_on:
        id: status_led_light
    - delay: 500ms
    - switch.turn_off: relay_2
    - light.turn_off:
        id: status_led_light

light:
  - platform: status_led
    name: "Switch state"
    id: status_led_light
    icon: "mdi:led-variant-on"
    pin: 
      number: GPIO23
      inverted: false
