esphome:
  name: side-gate-control-2
  friendly_name: Side Gate Control 2
  min_version: 2026.7.0
  
esp32:
  board: esp32dev
  framework:
    type: esp-idf
    advanced:
      minimum_chip_revision: "3.1"
      sram1_as_iram: true

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_key

web_server:
  port: 80
  auth:
    username: !secret web_username
    password: !secret web_password
    type: digest

# Allow Over-The-Air updates
ota:
- platform: esphome
  password: !secret otapw

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    password: !secret ap_wifi_password

captive_portal:

sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s
  - platform: uptime
    name: Uptime
    icon: mdi:clock-start
  - platform: internal_temperature
    name: "Internal Temperature"

switch:
  - platform: gpio
    pin: GPIO16
    id: relay
    name: "Gate Remote"
    icon: "mdi:gate"
    on_turn_on:
    - delay: 500ms
    - switch.turn_off: relay

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO0
      mode: INPUT_PULLUP
    name: Button
    filters:
      - invert
      - delayed_on_off: 50ms
    on_press:
      then:
        - switch.turn_on: relay

status_led:
  pin:
    number: GPIO23
    inverted: true
